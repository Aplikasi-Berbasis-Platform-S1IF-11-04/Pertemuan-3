<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramadan Kareem | Berkah THR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .arabic { font-family: 'Amiri', serif; }
        .ramadan-bg {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1564121211835-e88c852648ab?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
        }
        .modal-enter { animation: zoomIn 0.3s ease-out; }
        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="ramadan-bg h-screen flex items-center justify-center overflow-hidden">

    <div class="text-center text-white px-4">
        <h2 class="arabic text-5xl mb-4 text-yellow-400">رمضان كريم</h2>
        <h1 class="text-4xl md:text-6xl font-bold mb-6">Selamat Menunaikan <br> Ibadah Puasa</h1>
        <p class="text-lg mb-8 text-gray-200">Semoga keberkahan menyertai setiap langkah kita di bulan suci ini.</p>
        
        <button onclick="openModal()" class="bg-yellow-500 hover:bg-yellow-400 text-green-900 font-bold py-4 px-8 rounded-full shadow-2xl transform transition hover:scale-110 active:scale-95 flex items-center mx-auto space-x-2">
            <span>🎁 Cek Berkah THR Kamu</span>
        </button>
    </div>

    <div id="modalOverlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl max-w-sm w-full p-8 text-center relative modal-enter">
            <div class="text-6xl mb-4">🌙</div>
            <h3 class="text-2xl font-bold text-green-700 mb-2">Mubarak!</h3>
            <p class="text-gray-600 mb-6">"Selamat, Anda mendapatkan THR!"</p>
            
            <div class="bg-yellow-100 border-2 border-dashed border-yellow-500 p-4 rounded-xl mb-6">
                <span class="text-sm text-yellow-700 font-semibold uppercase">Voucher Kode:</span>
                <p class="text-2xl font-bold text-yellow-600">RAMADAN2026</p>
            </div>

            <button onclick="closeModal()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition">
                Alhamdulillah, Terima Kasih!
            </button>
        </div>
    </div>
    <script>
        function openModal() {
            const modal = document.getElementById('modalOverlay');
            modal.classList.remove('hidden');
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#fbbf24', '#16a34a', '#ffffff']
            });
        }

        function closeModal() {
            const modal = document.getElementById('modalOverlay');
            modal.classList.add('hidden');
        }

        // WahyuBagusSetiawan_2311102296
        window.onclick = function(event) {
            const modal = document.getElementById('modalOverlay');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
